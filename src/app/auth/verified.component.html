<div class="verified-container">
  <div class="verified-card">
    <div class="verified-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#10b981" stroke-width="2"/>
        <path d="M20 32L28 40L44 24" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <h1 *ngIf="!error && !isLoading">Email Verified Successfully!</h1>
    <p *ngIf="!error && !isLoading" class="subtitle">Your account is now active.</p>

    <div *ngIf="isLoading" class="loading">
      <div class="spinner"></div>
      <p>Verifying your email...</p>
    </div>

    <div *ngIf="error" class="error-message">
      <p>{{ error }}</p>
    </div>

    <button
      *ngIf="!isLoading"
      (click)="navigateToLogin()"
      class="login-button"
      title="Return to login page">
      {{ error ? 'Back to Login' : 'Go to Login' }}
    </button>
  </div>
</div>
