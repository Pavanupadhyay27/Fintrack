<div class="income-container">
  <div class="form-box">
    <h2>Add Income</h2>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Description</label>
        <input
          type="text"
          [(ngModel)]="description"
          name="description"
          placeholder="e.g., Monthly Salary"
        />
      </div>

      <div class="form-group">
        <label>Amount (₹)</label>
        <input
          type="number"
          [(ngModel)]="amount"
          name="amount"
          placeholder="Enter amount"
          step="0.01"
        />
      </div>

      <div class="form-group">
        <label for="income-category">Category</label>
        <select id="income-category" [(ngModel)]="category" name="category" title="Select income category">
          <option *ngFor="let cat of incomeCategories" [value]="cat">
            {{ cat }}
          </option>
        </select>
      </div>

      <button type="submit" class="btn-submit">
        Add Income
      </button>
    </form>

    <div *ngIf="message" class="message" [class.success]="isSuccess">
      <span *ngIf="isSuccess" class="checkmark">✓</span>
      {{ message }}
    </div>
  </div>
</div>
